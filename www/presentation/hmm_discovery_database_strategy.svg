<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">HMM Discovery database strategy</title>
  <desc id="desc">A presentation diagram separating core discovery databases, annotation databases, and scale/control databases.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .title { font: 800 62px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .subtitle { font: 400 27px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536471; }
      .col-title { font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .body { font: 400 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536471; }
      .item { font: 800 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .card { fill: #ffffff; stroke: #d9e2ea; stroke-width: 2; rx: 18; }
      .head1 { fill: #284b8f; rx: 18; }
      .head2 { fill: #0f766e; rx: 18; }
      .head3 { fill: #9a6700; rx: 18; }
      .muted { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536471; }
      .check { fill: #0f766e; }
      .warn { fill: #9a6700; }
      .line { stroke: #d9e2ea; stroke-width: 3; }
    </style>
  </defs>
  <rect class="bg" width="1920" height="1080"/>
  <text class="title" x="96" y="106">Database Strategy</text>
  <text class="subtitle" x="98" y="153">Use discovery databases to find homologs, then annotation layers to explain them.</text>

  <g transform="translate(96 230)">
    <rect class="card" x="0" y="0" width="520" height="690"/>
    <rect class="head1" x="0" y="0" width="520" height="92"/>
    <text class="col-title" x="34" y="59">Core Discovery</text>
    <text class="body" x="34" y="142">Used to discover candidate homologs</text>
    <line class="line" x1="34" y1="176" x2="486" y2="176"/>
    <circle class="check" cx="54" cy="230" r="12"/><text class="item" x="84" y="239">INPHARED proteins</text>
    <circle class="check" cx="54" cy="292" r="12"/><text class="item" x="84" y="301">INPHARED genomes</text>
    <circle class="check" cx="54" cy="354" r="12"/><text class="item" x="84" y="363">RefSeq viral proteins</text>
    <circle class="check" cx="54" cy="416" r="12"/><text class="item" x="84" y="425">RefSeq viral genomes</text>
    <circle class="check" cx="54" cy="478" r="12"/><text class="item" x="84" y="487">Swiss-Prot</text>
    <circle class="check" cx="54" cy="540" r="12"/><text class="item" x="84" y="549">Custom FASTA targets</text>
    <text class="muted" x="34" y="624">Reviewer-facing core:</text>
    <text class="body" x="34" y="657">hit counts, coverage, confidence, synteny</text>
  </g>

  <g transform="translate(700 230)">
    <rect class="card" x="0" y="0" width="520" height="690"/>
    <rect class="head2" x="0" y="0" width="520" height="92"/>
    <text class="col-title" x="34" y="59">Annotation Context</text>
    <text class="body" x="34" y="142">Used to interpret candidate proteins</text>
    <line class="line" x1="34" y1="176" x2="486" y2="176"/>
    <circle class="check" cx="54" cy="230" r="12"/><text class="item" x="84" y="239">VOGDB VFAM</text>
    <text class="body" x="84" y="274">Preferred viral ortholog/family layer</text>
    <circle class="check" cx="54" cy="338" r="12"/><text class="item" x="84" y="347">Pfam domains</text>
    <text class="body" x="84" y="382">Broad conserved-domain context</text>
    <circle class="check" cx="54" cy="446" r="12"/><text class="item" x="84" y="455">Swiss-Prot descriptions</text>
    <text class="body" x="84" y="490">Curated protein-level clues</text>
    <text class="muted" x="34" y="604">Annotation is evidence,</text>
    <text class="body" x="34" y="637">not proof of biochemical function.</text>
  </g>

  <g transform="translate(1304 230)">
    <rect class="card" x="0" y="0" width="520" height="690"/>
    <rect class="head3" x="0" y="0" width="520" height="92"/>
    <text class="col-title" x="34" y="59">Scale And Controls</text>
    <text class="body" x="34" y="142">Used for breadth and stress testing</text>
    <line class="line" x1="34" y1="176" x2="486" y2="176"/>
    <circle class="check" cx="54" cy="230" r="12"/><text class="item" x="84" y="239">GPD and GVD-AVrC</text>
    <text class="body" x="84" y="274">Gut and environmental viral breadth</text>
    <circle class="check" cx="54" cy="338" r="12"/><text class="item" x="84" y="347">RefSeq bacterial proteins</text>
    <text class="body" x="84" y="382">Specificity and background context</text>
    <circle class="check" cx="54" cy="446" r="12"/><text class="item" x="84" y="455">Six-frame ORF scans</text>
    <text class="body" x="84" y="490">Find short or annotation-missed genes</text>
    <text class="muted" x="34" y="604">Deploy readiness:</text>
    <text class="body" x="34" y="637">optional failures are recorded, not hidden.</text>
  </g>

  <text class="muted" x="96" y="1008">Recommended presentation framing: core discovery first, VOGDB/Pfam for annotation, scale databases for breadth and specificity.</text>
</svg>
