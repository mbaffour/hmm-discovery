<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">HMM Discovery workflow overview</title>
  <desc id="desc">Presentation workflow showing no-code HMM Discovery from seed FASTA to HMM build, database search, analysis, synteny, and export.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 800 64px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .subtitle { font: 400 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536471; }
      .step-title { font: 800 29px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .step-body { font: 400 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536471; }
      .label { font: 800 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .small { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536471; }
      .card { fill: #ffffff; stroke: #d9e2ea; stroke-width: 2; rx: 18; }
      .arrow { stroke: #536471; stroke-width: 5; fill: none; marker-end: url(#arrowhead); }
      .pill { fill: #e6f4f1; stroke: #b7ddd7; stroke-width: 2; rx: 18; }
      .pill-text { font: 800 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #115e59; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#536471"/>
    </marker>
  </defs>
  <rect class="bg" width="1920" height="1080"/>
  <text class="title" x="96" y="110">HMM Discovery Workflow</text>
  <text class="subtitle" x="98" y="154">A no-code research path from curated sequences to reviewer-ready evidence.</text>

  <g transform="translate(96 220)">
    <rect class="card" x="0" y="0" width="312" height="250"/>
    <circle cx="58" cy="58" r="34" fill="#284b8f"/>
    <text class="label" x="48" y="66">1</text>
    <text class="step-title" x="34" y="118">Input</text>
    <text class="step-body" x="34" y="154">Upload seed proteins,</text>
    <text class="step-body" x="34" y="184">single genome FASTA,</text>
    <text class="step-body" x="34" y="214">or custom database.</text>
  </g>
  <path class="arrow" d="M428 345 C470 345 478 345 520 345"/>

  <g transform="translate(540 220)">
    <rect class="card" x="0" y="0" width="312" height="250"/>
    <circle cx="58" cy="58" r="34" fill="#0f766e"/>
    <text class="label" x="48" y="66">2</text>
    <text class="step-title" x="34" y="118">Build HMM</text>
    <text class="step-body" x="34" y="154">MAFFT alignment,</text>
    <text class="step-body" x="34" y="184">trimAl cleanup,</text>
    <text class="step-body" x="34" y="214">HMMER profile.</text>
  </g>
  <path class="arrow" d="M872 345 C914 345 922 345 964 345"/>

  <g transform="translate(984 220)">
    <rect class="card" x="0" y="0" width="312" height="250"/>
    <circle cx="58" cy="58" r="34" fill="#9a6700"/>
    <text class="label" x="48" y="66">3</text>
    <text class="step-title" x="34" y="118">Search</text>
    <text class="step-body" x="34" y="154">Scan INPHARED,</text>
    <text class="step-body" x="34" y="184">RefSeq, Swiss-Prot,</text>
    <text class="step-body" x="34" y="214">or user FASTA.</text>
  </g>
  <path class="arrow" d="M1316 345 C1358 345 1366 345 1408 345"/>

  <g transform="translate(1428 220)">
    <rect class="card" x="0" y="0" width="312" height="250"/>
    <circle cx="58" cy="58" r="34" fill="#9f1239"/>
    <text class="label" x="48" y="66">4</text>
    <text class="step-title" x="34" y="118">Interpret</text>
    <text class="step-body" x="34" y="154">Classify hits, add</text>
    <text class="step-body" x="34" y="184">VOGDB/Pfam context,</text>
    <text class="step-body" x="34" y="214">check synteny.</text>
  </g>

  <g transform="translate(210 590)">
    <rect class="card" x="0" y="0" width="1500" height="300"/>
    <text class="step-title" x="44" y="68">Outputs designed for research use</text>
    <g transform="translate(44 112)">
      <rect class="pill" x="0" y="0" width="202" height="46"/><text class="pill-text" x="22" y="30">hits_main.tsv</text>
      <rect class="pill" x="226" y="0" width="280" height="46"/><text class="pill-text" x="248" y="30">best hit per genome</text>
      <rect class="pill" x="530" y="0" width="224" height="46"/><text class="pill-text" x="552" y="30">synteny table</text>
      <rect class="pill" x="778" y="0" width="178" height="46"/><text class="pill-text" x="800" y="30">GFF3</text>
      <rect class="pill" x="980" y="0" width="210" height="46"/><text class="pill-text" x="1002" y="30">figures</text>
      <rect class="pill" x="1214" y="0" width="206" height="46"/><text class="pill-text" x="1236" y="30">export ZIP</text>
    </g>
    <g transform="translate(44 190)">
      <text class="step-body" x="0" y="0">Every run can export methods text, reproducibility JSON, database provenance,</text>
      <text class="step-body" x="0" y="34">hit summaries, synteny placement reports, and citation guidance.</text>
    </g>
  </g>

  <text class="small" x="96" y="1008">HMM Discovery | presentation asset | www/presentation/hmm_discovery_workflow_overview.svg</text>
</svg>
